syntax = "proto3";

import "google/protobuf/duration.proto";

// StatusService reports the health of the gRPC server's dependencies and the queue's own backlog.
service StatusService {
  rpc Status(StatusRequest) returns (StatusResponse);
}

// DependencyStatus reports whether a single dependency is reachable and serving.
enum DependencyStatus {
  // DEPENDENCY_STATUS_UNSPECIFIED means the status has not yet been assessed, or the assessment failed.
  DEPENDENCY_STATUS_UNSPECIFIED = 0;
  // DEPENDENCY_STATUS_UP means the dependency was successfully pinged and should serve normally.
  DEPENDENCY_STATUS_UP = 1;
  // DEPENDENCY_STATUS_DOWN means the dependency was reached but did not report a healthy status.
  DEPENDENCY_STATUS_DOWN = 2;
}

// DependencyHealth reports the health of a single external dependency.
//
// The message carries the state alone. A dependency health-check error routinely embeds
// internal hostnames, ports, or schema names. The error is recorded on the trace span for
// operators.
message DependencyHealth {
  // Number 2 and name "err" are reserved so a future field cannot re-introduce a raw error
  // string.
  reserved 2;
  reserved "err";

  DependencyStatus status = 1;
}

// QueueDepth reports the queue's own backlog: how many jobs are due to run and still waiting, and
// how long the oldest of them has waited. Two numbers rather than one — a count alone cannot tell a
// queue absorbing a burst from a stalled one, and the oldest-pending age is what separates them.
message QueueDepth {
  // pending is the number of jobs whose run_at has been reached and that no worker has claimed yet.
  int64 pending = 1;
  // oldest_pending_age is how long the oldest due-and-unclaimed job has been waiting. Absent when
  // nothing is pending.
  google.protobuf.Duration oldest_pending_age = 2;
}

// StatusRequest takes no parameters.
message StatusRequest {}

// StatusResponse reports the health of each dependency the service relies on, and the queue backlog.
message StatusResponse {
  DependencyHealth postgres = 1;
  // queue is the backlog report. Absent when the database is unreachable, since it cannot be
  // measured — postgres reports down in that case.
  QueueDepth queue = 2;
}
