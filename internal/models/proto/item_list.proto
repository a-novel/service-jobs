syntax = "proto3";

import "item.proto";

// ItemListService returns a page of items.
service ItemListService {
  rpc ItemList(ItemListRequest) returns (ItemListResponse);
}

// ItemListRequest bounds the page of items to return.
message ItemListRequest {
  // Maximum number of items to return.
  int32 limit = 1;
  // Number of leading items to skip before collecting the page.
  int32 offset = 2;
}

// ItemListResponse returns the requested page of items, empty when none match.
message ItemListResponse {
  repeated Item items = 1;
}
