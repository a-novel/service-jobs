services:
  # ====================================================================================================================
  # DATABASE
  # ====================================================================================================================

  postgres-template:
    build:
      context: ..
      dockerfile: ./builds/database.Dockerfile
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - api
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: --auth=scram-sha-256
    volumes:
      - template-postgres-data:/var/lib/postgresql/

  # ====================================================================================================================
  # ONE-SHOT TARGETS
  # ====================================================================================================================

  service-jobs-migrations:
    profiles: ["migrations"]
    build:
      context: ..
      dockerfile: ./builds/migrations.Dockerfile
    depends_on:
      postgres-template:
        condition: service_healthy
    environment:
      POSTGRES_DSN: postgres://postgres:postgres@postgres-template:5432/postgres?sslmode=disable
    networks:
      - api

  # ====================================================================================================================
  # LONG-RUNNER TARGETS
  # ====================================================================================================================

  service-jobs-grpc:
    profiles: ["grpc"]
    build:
      context: ..
      dockerfile: ./builds/standalone.grpc.Dockerfile
    ports:
      - "${GRPC_PORT}:8080"
    depends_on:
      postgres-template:
        condition: service_healthy
      service-jobs-migrations:
        condition: service_completed_successfully
    environment:
      POSTGRES_DSN: postgres://postgres:postgres@postgres-template:5432/postgres?sslmode=disable
    networks:
      - api

networks:
  api:

volumes:
  template-postgres-data:
